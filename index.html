// --- State ---
let vektData = [...manuelleData];
let status = "laster";
let sisteOppdatering = null;
let aktivFane = "vekt";

// --- Innstillinger ---
const SETTINGS_KEY = 'prosjekt_overskudd_settings';
let settingsData = {};
try {
  const s = localStorage.getItem(SETTINGS_KEY);
  if (s) settingsData = JSON.parse(s);
} catch(e) {}

function parseSett(str) {
  const m = str.match(/^(\d+)\s+sett\s+[×x]\s+(.+)/);
  if (m) return { antall: parseInt(m[1]), reps: m[2] };
  return { antall: null, reps: str };
}

function visSett(nr, defaultStr) {
  const c = settingsData[nr];
  if (!c) return defaultStr;
  const parsed = parseSett(defaultStr);
  if (parsed.antall != null && c.antall != null) return `${c.antall} sett × ${c.reps || parsed.reps}`;
  return c.reps || defaultStr;
}

// --- Lyd ---
function spillDing(frekvens = 880, varighet = 0.7) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(frekvens, ctx.currentTime);
    gain.gain.setValueAtTime(0.45, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + varighet);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + varighet);
  } catch(e) {}
}

function spillSeier() {
  [880, 1100, 1320].forEach((f, i) => setTimeout(() => spillDing(f, 0.55), i * 220));
}

// --- Utils ---
function parseAppsScriptData(rows) {
  const dagMap = {};
  for (const row of rows) {
    const datoRaw = row.dato;
    const klokkaRaw = row.klokka || "";
    const vektRaw = parseFloat(String(row.vekt).replace(",", "."));
    if (isNaN(vektRaw) || vektRaw > 300) continue;
    if (!datoRaw || !datoRaw.includes(".")) continue;
    const parts = datoRaw.split(".");
    if (parts.length < 3) continue;
    const [dd, mm, yyyy] = parts;
    const datoKey = `${yyyy}-${mm}-${dd}`;
    const datoLabel = `${parseInt(dd)}/${parseInt(mm)}`;
    let time = 12;
    const timeMatch = klokkaRaw.match(/(\d{2}):(\d{2}):(\d{2})/);
    if (timeMatch) time = parseInt(timeMatch[1]);
    if (!dagMap[datoKey]) dagMap[datoKey] = { datoKey, datoLabel, beste: null, bestTime: 99 };
    const erMorgen = time < 12;
    const harMorgen = dagMap[datoKey].bestTime < 12;
    if (dagMap[datoKey].beste === null || (erMorgen && !harMorgen) || (erMorgen && time < dagMap[datoKey].bestTime)) {
      dagMap[datoKey].beste = vektRaw;
      dagMap[datoKey].bestTime = time;
    }
  }
  return Object.values(dagMap)
    .sort((a, b) => a.datoKey.localeCompare(b.datoKey))
    .filter(d => d.beste !== null)
    .map(d => ({ dato: d.datoLabel, vekt: d.beste, kilde: "sheets" }));
}

// --- Last inn cache fra forrige besøk ---
const CACHE_KEY = "prosjekt_overskudd_vekt";
try {
  const cached = localStorage.getItem(CACHE_KEY);
  if (cached) {
    const parsed = JSON.parse(cached);
    if (parsed.length > 0) {
      vektData = parsed;
      status = "live";
    }
  }
} catch(e) {}

async function loggTrening() {
  const btn = document.getElementById("logg-btn");
  if (btn) { btn.textContent = "Logger…"; btn.disabled = true; }
  try {
    const res = await fetch(APPS_SCRIPT_URL + "?action=loggTrening");
    const tekst = await res.text();
    if (tekst.trim() === "OK") {
      if (btn) { btn.textContent = "✅ Logget!"; btn.style.background = "#00C9A7"; btn.style.color = "#0A0A0F"; }
      setTimeout(() => { if (btn) { btn.textContent = "📅 Logg treningsøkt"; btn.style.background = "rgba(255,107,53,0.1)"; btn.style.color = "#FF6B35"; btn.disabled = false; } }, 3000);
    } else throw new Error();
  } catch {
    if (btn) { btn.textContent = "❌ Feil – prøv igjen"; btn.disabled = false; }
    setTimeout(() => { if (btn) { btn.textContent = "📅 Logg treningsøkt"; btn.disabled = false; } }, 3000);
  }
}

async function hentData() {
  try {
    const res = await fetch(APPS_SCRIPT_URL);
    if (!res.ok) throw new Error();
    const json = await res.json();
    const sheetsData = parseAppsScriptData(json);
    if (sheetsData.length === 0) throw new Error();
    vektData = [...manuelleData, ...sheetsData];
    sisteOppdatering = new Date().toLocaleTimeString("nb-NO", { hour: "2-digit", minute: "2-digit" });
    status = "live";
    try { localStorage.setItem(CACHE_KEY, JSON.stringify(vektData)); } catch(e) {}
  } catch(e) {
    console.error("Fetch feil:", e);
    status = "feil";
  }
  render();
}

// --- SVG Graf ---
function lagGraf(data) {
  if (!data.length) return "";
  const W = 340, H = 160, PL = 30, PR = 10, PT = 10, PB = 20;
  const vekter = data.map(d => d.vekt);
  const minV = Math.min(...vekter) - 1;
  const maxV = Math.max(...vekter) + 1;
  const xStep = (W - PL - PR) / (data.length - 1);
  const yScale = v => PT + (H - PT - PB) * (1 - (v - minV) / (maxV - minV));
  const xScale = i => PL + i * xStep;
  const lavest = Math.min(...vekter);
  const lavY = yScale(lavest);

  const points = data.map((d, i) => `${xScale(i)},${yScale(d.vekt)}`).join(" ");
  const areaPoints = `${xScale(0)},${H - PB} ` + data.map((d, i) => `${xScale(i)},${yScale(d.vekt)}`).join(" ") + ` ${xScale(data.length-1)},${H - PB}`;

  // X-labels: vis bare første, midtre og siste
  const labelIdxs = [0, Math.floor(data.length/2), data.length-1];
  const xLabels = labelIdxs.map(i => `<text x="${xScale(i)}" y="${H - 4}" text-anchor="middle" fill="rgba(240,237,230,0.3)" font-size="8" font-family="DM Mono, monospace">${data[i].dato}</text>`).join("");

  const dots = data.map((d, i) => `<circle cx="${xScale(i)}" cy="${yScale(d.vekt)}" r="3" fill="${d.kilde === 'manuell' ? 'rgba(255,107,53,0.45)' : '#FF6B35'}" />`).join("");

  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">
    <defs>
      <linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.15"/>
        <stop offset="100%" stop-color="#FF6B35" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <line x1="${PL}" y1="${lavY}" x2="${W-PR}" y2="${lavY}" stroke="#00C9A7" stroke-dasharray="4 4" stroke-opacity="0.4" stroke-width="1"/>
    <polygon points="${areaPoints}" fill="url(#grad)"/>
    <polyline points="${points}" fill="none" stroke="#FF6B35" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}
    ${xLabels}
    <text x="${W-PR}" y="${lavY - 4}" text-anchor="end" fill="#00C9A7" font-size="8" font-family="DM Mono, monospace" opacity="0.7">laveste ${lavest} kg</text>
  </svg>`;
}

// --- Timer komponent ---
function lagTimer(id, sekunder, label, farge) {
  return `
  <div id="timer-${id}" onclick="event.stopPropagation()" style="margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:16px;">
    <div style="position:relative;width:80px;height:80px;flex-shrink:0;">
      <svg width="80" height="80" style="transform:rotate(-90deg)">
        <circle cx="40" cy="40" r="34" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="5"/>
        <circle id="ring-${id}" cx="40" cy="40" r="34" fill="none" stroke="${farge}" stroke-width="5" stroke-linecap="round"
          stroke-dasharray="${2*Math.PI*34}" stroke-dashoffset="0" style="transition:stroke-dashoffset 0.9s linear"/>
      </svg>
      <div style="position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;">
        <span id="display-${id}" style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;color:#F0EDE6;">${sekunder}</span>
        <span style="font-family:'DM Mono',monospace;font-size:8px;color:rgba(240,237,230,0.35);">sek</span>
      </div>
    </div>
    <div style="flex:1;">
      <div style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.15em;color:rgba(240,237,230,0.35);margin-bottom:8px;">${label}</div>
      <div id="btn-${id}">
        <button onclick="startTimer('${id}',${sekunder},'${farge}')" style="background:${farge};border:none;border-radius:8px;padding:8px 20px;font-weight:800;font-size:14px;color:#0A0A0F;">START</button>
      </div>
    </div>
  </div>`;
}

const timerState = {};
function startTimer(id, total, farge) {
  if (timerState[id]) { clearInterval(timerState[id].interval); }
  let sek = total;
  const ring = document.getElementById(`ring-${id}`);
  const display = document.getElementById(`display-${id}`);
  const btn = document.getElementById(`btn-${id}`);
  const C = 2 * Math.PI * 34;
  const isTid = total >= 60;

  function vis(s) {
    if (isTid) {
      const m = Math.floor(s/60), sc = s%60;
      display.textContent = `${m}:${String(sc).padStart(2,"0")}`;
    } else {
      display.textContent = s;
    }
    ring.style.strokeDashoffset = C * (1 - s/total);
  }

  btn.innerHTML = `<button onclick="stoppTimer('${id}',${total},'${farge}')" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:7px 14px;font-weight:700;font-size:13px;color:rgba(240,237,230,0.5);">AVBRYT</button>`;
  vis(sek);

  timerState[id] = { interval: setInterval(() => {
    sek--;
    vis(sek);
    if (sek <= 0) {
      clearInterval(timerState[id].interval);
      spillDing();
      display.textContent = "✓";
      display.style.color = "#00C9A7";
      display.style.fontSize = "28px";
      ring.style.stroke = "#00C9A7";
      btn.innerHTML = `<div style="color:#00C9A7;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;margin-bottom:8px;">Fullført! 💪</div><button onclick="startTimer('${id}',${total},'${farge}')" style="background:rgba(255,107,53,0.1);border:1px solid rgba(255,107,53,0.3);border-radius:8px;padding:7px 16px;font-weight:700;font-size:13px;color:#FF6B35;">IGJEN</button>`;
    }
  }, 1000) };
}

function stoppTimer(id, total, farge) {
  if (timerState[id]) clearInterval(timerState[id].interval);
  const ring = document.getElementById(`ring-${id}`);
  const display = document.getElementById(`display-${id}`);
  const btn = document.getElementById(`btn-${id}`);
  const C = 2 * Math.PI * 34;
  if (ring) { ring.style.strokeDashoffset = 0; ring.style.stroke = farge; }
  if (display) { display.textContent = total >= 60 ? `${Math.floor(total/60)}:00` : String(total); display.style.color = "#F0EDE6"; display.style.fontSize = "22px"; }
  if (btn) btn.innerHTML = `<button onclick="startTimer('${id}',${total},'${farge}')" style="background:${farge};border:none;border-radius:8px;padding:8px 20px;font-weight:800;font-size:14px;color:#0A0A0F;">START</button>`;
}

// --- Boks-timer ---
let boksState = { fase: "klar", runde: 1, sek: 180 };
let boksInterval = null;

function startBoks() {
  boksState = { fase: "arbeid", runde: 1, sek: 180 };
  clearInterval(boksInterval);
  boksInterval = setInterval(tickBoks, 1000);
  renderBoksTimer();
}

function avbrytBoks() {
  clearInterval(boksInterval);
  boksState = { fase: "klar", runde: 1, sek: 180 };
  renderBoksTimer();
}

function tickBoks() {
  boksState.sek--;
  if (boksState.sek <= 0) {
    if (boksState.fase === "arbeid") {
      if (boksState.runde >= 3) {
        boksState.fase = "ferdig";
        clearInterval(boksInterval);
        spillSeier();
      } else {
        boksState.fase = "pause";
        boksState.sek = 60;
        spillDing(660, 0.6);
      }
    } else if (boksState.fase === "pause") {
      boksState.runde++;
      boksState.fase = "arbeid";
      boksState.sek = 180;
      spillDing(880, 0.5);
    }
  }
  renderBoksTimer();
}

function renderBoksTimer() {
  const el = document.getElementById("boks-timer");
  if (!el) return;
  const { fase, runde, sek } = boksState;
  const total = fase === "pause" ? 60 : 180;
  const farge = fase === "pause" ? "#00C9A7" : fase === "ferdig" ? "#8B8B8B" : "#FF6B35";
  const label = fase === "klar" ? "KLAR" : fase === "arbeid" ? "BOKS!" : fase === "pause" ? "PAUSE" : "FERDIG!";
  const C = 2 * Math.PI * 70;
  const offset = fase === "klar" ? 0 : fase === "ferdig" ? C : C * (1 - sek/total);
  const min = Math.floor(sek/60), sec = sek%60;
  const tidTekst = fase === "ferdig" ? "🥊" : `${min}:${String(sec).padStart(2,"0")}`;
  const runder = [1,2,3].map(n => {
    const bg = n < runde ? "#FF6B35" : (n === runde && fase !== "klar" && fase !== "ferdig") ? "rgba(255,107,53,0.2)" : "rgba(255,255,255,0.05)";
    const border = n <= runde && fase !== "klar" ? "#FF6B35" : "rgba(255,255,255,0.1)";
    const color = n < runde ? "#0A0A0F" : (n === runde && fase !== "klar") ? "#FF6B35" : "rgba(240,237,230,0.3)";
    return `<div style="width:32px;height:32px;border-radius:50%;background:${bg};border:2px solid ${border};display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;color:${color};">${n}</div>`;
  }).join("");

  let knapp = "";
  if (fase === "klar") knapp = `<button onclick="startBoks()" style="background:#FF6B35;border:none;border-radius:12px;padding:14px 40px;font-weight:800;font-size:18px;color:#0A0A0F;">START</button>`;
  else if (fase === "arbeid" || fase === "pause") knapp = `<button onclick="avbrytBoks()" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 28px;font-weight:700;font-size:16px;color:rgba(240,237,230,0.6);">AVBRYT</button>`;

function toggleOvelse(i) {
  const detalj = document.getElementById(`detalj-${i}`);

  const ovelse = document.getElementById(`ovelse-${i}`);
  const erÅpen = detalj.style.display !== "none";
  detalj.style.display = erÅpen ? "none" : "block";
  chevron.style.transform = erÅpen ? "rotate(0deg)" : "rotate(180deg)";
  ovelse.style.background = erÅpen ? "rgba(255,255,255,0.03)" : "rgba(255,255,255,0.06)";

function lagreSettings() {
  plan.øvelser.forEach(ø => {
    const settEl = document.getElementById(`sett-${ø.nr}`);
    const repsEl = document.getElementById(`reps-${ø.nr}`);
    const parsed = parseSett(ø.sett);
    const antall = settEl ? parseInt(settEl.value) : null;
    const reps   = repsEl ? repsEl.value.trim() : null;
    if (reps) {
      settingsData[ø.nr] = { antall: (!isNaN(antall) && antall > 0) ? antall : parsed.antall, reps };
    }
  });
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(settingsData));
  document.getElementById('settings-panel').classList.add('hidden');
  render();
}

function nullstillSettings() {
  settingsData = {};
  localStorage.removeItem(SETTINGS_KEY);
  document.getElementById('settings-panel').classList.add('hidden');
  render();
}

// --- Service Worker ---
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/prosjekt-overskudd/sw.js');
}

// --- Install prompt ---
let installEvent = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  installEvent = e;
  const banner = document.getElementById('install-banner');
  if (banner) banner.classList.remove('hidden');
});

window.addEventListener('appinstalled', () => {
  const banner = document.getElementById('install-banner');
  if (banner) banner.classList.add('hidden');
  installEvent = null;
});

function installApp() {
  if (!installEvent) return;
  installEvent.prompt();
  installEvent.userChoice.then(() => { installEvent = null; });
}
</script>
</body>
</html>
