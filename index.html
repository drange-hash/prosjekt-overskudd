function parseAppsScriptData(rows) {
  const dagMap = {};
  for (const row of rows) {
    const datoRaw = row.dato;
    const klokkaRaw = row.klokka;
    const vektRaw = parseFloat(String(row.vekt).replace(",", "."));
    if (isNaN(vektRaw) || vektRaw > 300) continue;
    if (!datoRaw || !datoRaw.includes(".")) continue;
    const parts = datoRaw.split(".");
    if (parts.length < 3) continue;
    const [dd, mm, yyyy] = parts;
    const datoKey = `${yyyy}-${mm}-${dd}`;
    const datoLabel = `${parseInt(dd)}/${parseInt(mm)}`;
    let time = 12;
    const timeMatch = klokkaRaw.match(/(\d{2}):(\d{2}):(\d{2})/);
    if (timeMatch) time = parseInt(timeMatch[1]);
    if (!dagMap[datoKey]) dagMap[datoKey] = { datoKey, datoLabel, beste: null, bestTime: 99 };
    const erMorgen = time < 12;
    const harMorgen = dagMap[datoKey].bestTime < 12;
    if (dagMap[datoKey].beste === null || (erMorgen && !harMorgen) || (erMorgen && time < dagMap[datoKey].bestTime)) {
      dagMap[datoKey].beste = vektRaw;
      dagMap[datoKey].bestTime = time;
    }
  }
  return Object.values(dagMap)
    .sort((a, b) => a.datoKey.localeCompare(b.datoKey))
    .filter(d => d.beste !== null)
    .map(d => ({ dato: d.datoLabel, vekt: d.beste, kilde: "sheets" }));
}

function PlankeTimer() {

  const reset = (e) => { e.stopPropagation(); clearInterval(ref.current); setAktiv(false); setFerdig(false); setSek(SECS); };
  useEffect(() => {
    if (!aktiv) { clearInterval(ref.current); return; }
    ref.current = setInterval(() => setSek(p => { if (p <= 1) { clearInterval(ref.current); setAktiv(false); setFerdig(true); return 0; } return p - 1; }), 1000);
    return () => clearInterval(ref.current);
  }, [aktiv]);
  const r = 36, c = 2 * Math.PI * r;
  const farge = ferdig ? "#00C9A7" : aktiv ? "#FF6B35" : "rgba(255,255,255,0.2)";
  return (

        <div style={{ position: "absolute", top: 0, left: 0, right: 0, bottom: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>

function BoxeTimer() {
  const [fase, setFase] = useState("klar");
  const [runde, setRunde] = useState(1);
  const [sek, setSek] = useState(180);
  const ref = useRef(null);
  const stopp = () => { clearInterval(ref.current); ref.current = null; };
  const reset = () => { stopp(); setFase("klar"); setRunde(1); setSek(180); };
  const start = () => { setFase("arbeid"); setSek(180); };
  useEffect(() => {
    if (fase === "klar" || fase === "ferdig") { stopp(); return; }
    ref.current = setInterval(() => {
      setSek(prev => {
        if (prev <= 1) {
          if (fase === "arbeid") { if (runde >= 3) { setFase("ferdig"); stopp(); return 0; } setFase("pause"); return 60; }
          else { setRunde(r => r + 1); setFase("arbeid"); return 180; }
        }
        return prev - 1;
      });
    }, 1000);
    return () => clearInterval(ref.current);
  }, [fase, runde]);
  const min = Math.floor(sek/60), sec = sek%60;
  const total = fase === "pause" ? 60 : 180;
  const r = 70, c = 2 * Math.PI * r;
  const farge = fase === "pause" ? "#00C9A7" : fase === "ferdig" ? "#8B8B8B" : "#FF6B35";
  const label = fase === "klar" ? "KLAR" : fase === "arbeid" ? "BOKS!" : fase === "pause" ? "PAUSE" : "FERDIG!";
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", padding: "8px 0 16px" }}>
      <div style={{ display: "flex", gap: 10, marginBottom: 24 }}>
        {[1,2,3].map(n => <div key={n} style={{ width: 32, height: 32, borderRadius: "50%", background: n < runde ? "#FF6B35" : n === runde && fase !== "klar" && fase !== "ferdig" ? "rgba(255,107,53,0.2)" : "rgba(255,255,255,0.05)", border: `2px solid ${n <= runde && fase !== "klar" ? "#FF6B35" : "rgba(255,255,255,0.1)"}`, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 700, fontSize: 14, color: n < runde ? "#0A0A0F" : n === runde && fase !== "klar" ? "#FF6B35" : "rgba(240,237,230,0.3)" }}>{n}</div>)}
      </div>
      <div style={{ position: "relative", width: 180, height: 180, marginBottom: 24 }}>
        <svg width="180" height="180" style={{ transform: "rotate(-90deg)" }}>
          <circle cx="90" cy="90" r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="8" />
          <circle cx="90" cy="90" r={r} fill="none" stroke={farge} strokeWidth="8" strokeLinecap="round" strokeDasharray={c} strokeDashoffset={fase === "klar" ? 0 : fase === "ferdig" ? c : c * (1 - sek/total)} style={{ transition: "stroke-dashoffset 0.9s linear, stroke 0.3s ease" }} />
        </svg>
        <div style={{ position: "absolute", top: 0, left: 0, right: 0, bottom: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
          <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, letterSpacing: "0.2em", color: farge, marginBottom: 4 }}>{label}</div>
          <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 900, fontSize: 44, color: "#F0EDE6", lineHeight: 1 }}>{fase === "ferdig" ? "🥊" : `${min}:${String(sec).padStart(2,"0")}`}</div>
          {fase !== "klar" && fase !== "ferdig" && <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 9, color: "rgba(240,237,230,0.35)", marginTop: 4 }}>RUNDE {runde} AV 3</div>}
        </div>
      </div>
      <div style={{ display: "flex", gap: 12 }}>
        {fase === "klar" && <button onClick={start} style={{ background: "#FF6B35", border: "none", borderRadius: 12, padding: "14px 40px", fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 800, fontSize: 18, color: "#0A0A0F", cursor: "pointer" }}>START</button>}
        {(fase === "arbeid" || fase === "pause") && <button onClick={reset} style={{ background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 12, padding: "14px 28px", fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 700, fontSize: 16, color: "rgba(240,237,230,0.6)", cursor: "pointer" }}>AVBRYT</button>}

      </div>
    </div>
  );
}

          </div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 3 }}>
            <span style={{ fontSize: 11, color: "rgba(240,237,230,0.45)", fontFamily: "'DM Mono', monospace" }}>{øvelse.kategori}</span>
            <span style={{ fontSize: 12, color: øvelse.farge, fontWeight: 600, fontFamily: "'Barlow Condensed', sans-serif" }}>{øvelse.sett}</span>
          </div>
        </div>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style={{ transform: åpen ? "rotate(180deg)" : "rotate(0deg)", transition: "transform 0.3s ease", opacity: 0.6, flexShrink: 0 }}>
          <path d="M4 6l4 4 4-4" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </div>
      {åpen && (
        <div style={{ marginTop: 12, paddingTop: 12, borderTop: "1px solid rgba(255,255,255,0.07)", animation: "fadeIn 0.2s ease" }}>
          <p style={{ fontSize: 13, color: "rgba(240,237,230,0.75)", lineHeight: 1.6, margin: 0 }}>{øvelse.instruksjon}</p>
          {øvelse.tips && <p style={{ fontSize: 12, color: øvelse.farge, opacity: 0.85, marginTop: 8, marginBottom: 0, fontStyle: "italic" }}>💡 {øvelse.tips}</p>}
          {øvelse.planke && <PlankeTimer />}
          {øvelse.kobra && <KobraTimer />}
        </div>
      )}
    </div>
  );
}

function App() {
  const [fane, setFane] = useState("vekt");
  const [vektData, setVektData] = useState(manuelleData);
  const [status, setStatus] = useState("laster");
  const [sisteOppdatering, setSisteOppdatering] = useState(null);

  const hentData = async () => {
    setStatus("laster");
    try {
      const res = await fetch(APPS_SCRIPT_URL);
      if (!res.ok) throw new Error();
      const json = await res.json();
      const sheetsData = parseAppsScriptData(json);
      if (sheetsData.length === 0) throw new Error();
      setVektData([...manuelleData, ...sheetsData]);
      setSisteOppdatering(new Date().toLocaleTimeString("nb-NO", { hour: "2-digit", minute: "2-digit" }));
      setStatus("live");
    } catch {
      setStatus("feil");
    }
  };

  useEffect(() => { hentData(); }, []);

  const første = vektData[0]?.vekt ?? null;
  const siste = vektData[vektData.length - 1]?.vekt ?? null;
  const lavest = vektData.length > 0 ? Math.min(...vektData.map(d => d.vekt)) : null;
  const diff = første && siste ? første - siste : null;
  const tapVisning = diff !== null ? (diff >= 0 ? `−${diff.toFixed(1)} kg` : `+${Math.abs(diff).toFixed(1)} kg`) : "–";
  const tapFarge = diff !== null && diff >= 0 ? "#00C9A7" : "#FF3B3B";

  return (
    <div style={{ minHeight: "100vh", background: "#0A0A0F", backgroundImage: "radial-gradient(ellipse 80% 60% at 50% -10%, rgba(255,107,53,0.12) 0%, transparent 60%)", paddingBottom: 48 }}>
      <div style={{ padding: "32px 24px 24px", borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
        <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, letterSpacing: "0.25em", color: "#FF6B35", marginBottom: 6, animation: "pulse 3s ease infinite" }}>● AKTIV PLAN</div>
        <h1 style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 900, fontSize: 38, letterSpacing: "0.04em", lineHeight: 1, color: "#F0EDE6" }}>PROSJEKT<br/>OVERSKUDD</h1>
        <p style={{ marginTop: 8, fontSize: 13, color: "rgba(240,237,230,0.5)", fontFamily: "'DM Mono', monospace" }}>Vektnedgang · Kjernestyrke · Egenvekt</p>
        <div style={{ display: "flex", gap: 8, marginTop: 16, flexWrap: "wrap" }}>
          {[{ label: "500 kcal/dag", sub: "Aktivitetsmål" }, { label: "150–160g", sub: "Protein daglig" }, { label: "−400–600 kcal", sub: "Underskudd" }].map(chip => (
            <div key={chip.label} style={{ background: "rgba(255,107,53,0.1)", border: "1px solid rgba(255,107,53,0.25)", borderRadius: 8, padding: "7px 12px" }}>
              <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 700, fontSize: 14, color: "#FF6B35" }}>{chip.label}</div>
              <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 9, color: "rgba(240,237,230,0.45)", marginTop: 1 }}>{chip.sub}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{ display: "flex", padding: "16px 24px 0", borderBottom: "1px solid rgba(255,255,255,0.06)", overflowX: "auto" }}>
        {[{ id: "vekt", label: "VEKT" }, { id: "kosthold", label: "KOSTHOLD" }, { id: "styrke", label: "STYRKE" }, { id: "hvile", label: "AKTIVE DAGER" }].map(f => (
          <button key={f.id} onClick={() => setFane(f.id)} style={{ background: "none", border: "none", borderBottom: fane === f.id ? "2px solid #FF6B35" : "2px solid transparent", color: fane === f.id ? "#FF6B35" : "rgba(240,237,230,0.4)", fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 700, fontSize: 13, letterSpacing: "0.1em", padding: "10px 14px", cursor: "pointer", transition: "all 0.2s ease", whiteSpace: "nowrap" }}>{f.label}</button>
        ))}
      </div>

      <div style={{ padding: "24px 24px 0" }}>
        {fane === "vekt" && (
          <div style={{ animation: "fadeIn 0.25s ease" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                {status === "laster" && <><div style={{ width: 8, height: 8, borderRadius: "50%", border: "1px solid #FF6B35", borderTopColor: "transparent", animation: "spin 0.8s linear infinite" }} /><span style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, color: "rgba(240,237,230,0.4)" }}>Henter fra Sheets…</span></>}
                {status === "live" && <><div style={{ width: 8, height: 8, borderRadius: "50%", background: "#00C9A7" }} /><span style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, color: "#00C9A7" }}>Live · Vekt Auto · {sisteOppdatering}</span></>}
                {status === "feil" && <><div style={{ width: 8, height: 8, borderRadius: "50%", background: "#FF3B3B" }} /><span style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, color: "#FF3B3B" }}>Kan ikke nå Sheets</span></>}
              </div>
              <button onClick={hentData} disabled={status === "laster"} style={{ background: "#FF6B35", border: "none", borderRadius: 8, padding: "8px 16px", cursor: status === "laster" ? "default" : "pointer", fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 700, fontSize: 14, color: "#0A0A0F", opacity: status === "laster" ? 0.5 : 1 }}>↻ Oppdater</button>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 20 }}>
              {[
                { label: "START", value: første ? `${første} kg` : "–", sub: "26. feb 2026", farge: "rgba(240,237,230,0.6)" },
                { label: "NÅ", value: siste ? `${siste} kg` : "–", sub: vektData[vektData.length-1]?.dato ?? "–", farge: "#FF6B35" },
                { label: "LAVESTE", value: lavest ? `${lavest} kg` : "–", sub: "beste måling", farge: "#00C9A7" },
                { label: "TOTALT TAP", value: tapVisning, sub: "siden start", farge: tapFarge },
              ].map(s => (
                <div key={s.label} style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 12, padding: "14px 16px" }}>
                  <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 9, letterSpacing: "0.15em", color: "rgba(240,237,230,0.35)", marginBottom: 4 }}>{s.label}</div>
                  <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 800, fontSize: 24, color: s.farge }}>{s.value}</div>
                  <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 9, color: "rgba(240,237,230,0.35)", marginTop: 2 }}>{s.sub}</div>
                </div>
              ))}
            </div>
            <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 12, padding: "16px 8px 12px", marginBottom: 16 }}>
              <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, letterSpacing: "0.2em", color: "rgba(240,237,230,0.35)", marginBottom: 12, paddingLeft: 8 }}>MORGENVEKT — FEB–APR 2026</div>
              <ResponsiveContainer width="100%" height={200}>
                <LineChart data={vektData} margin={{ top: 4, right: 16, left: -20, bottom: 0 }}>
                  <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.05)" />
                  <XAxis dataKey="dato" tick={{ fontFamily: "'DM Mono', monospace", fontSize: 9, fill: "rgba(240,237,230,0.3)" }} tickLine={false} axisLine={false} interval="preserveStartEnd" />
                  <YAxis domain={["auto","auto"]} tick={{ fontFamily: "'DM Mono', monospace", fontSize: 9, fill: "rgba(240,237,230,0.3)" }} tickLine={false} axisLine={false} />
                  <Tooltip content={<CustomTooltip />} />
                  {lavest && <ReferenceLine y={lavest} stroke="#00C9A7" strokeDasharray="4 4" strokeOpacity={0.4} />}
                  <Line type="monotone" dataKey="vekt" stroke="#FF6B35" strokeWidth={2.5} dot={(p) => <circle key={`${p.cx}-${p.cy}`} cx={p.cx} cy={p.cy} r={3} fill={p.payload.kilde === "manuell" ? "rgba(255,107,53,0.45)" : "#FF6B35"} />} activeDot={{ r: 5, fill: "#FF6B35" }} />
                </LineChart>
              </ResponsiveContainer>
            </div>
            <div style={{ background: "rgba(255,107,53,0.07)", border: "1px solid rgba(255,107,53,0.2)", borderRadius: 12, padding: 14 }}>
              <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 800, fontSize: 12, letterSpacing: "0.1em", color: "#FF6B35", marginBottom: 6 }}>⚠ MULIG PLATÅ</div>
              <p style={{ fontSize: 13, color: "rgba(240,237,230,0.65)", lineHeight: 1.6 }}>Vekta har ligget stabilt mellom 125–126 kg de siste 2 ukene. Kroppen tilpasser seg – hvis den ikke beveger seg de neste 2–3 ukene er det tid for å se på kaloriinntaket.</p>
            </div>
          </div>
        )}

        {fane === "kosthold" && (
          <div style={{ animation: "fadeIn 0.25s ease" }}>
            <div style={{ background: "rgba(255,107,53,0.08)", border: "1px solid rgba(255,107,53,0.2)", borderRadius: 12, padding: 16, marginBottom: 16 }}>
              <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 800, fontSize: 13, letterSpacing: "0.1em", color: "#FF6B35", marginBottom: 6 }}>🔴 VIKTIGST FOR VEKTTAP</div>
              <p style={{ fontSize: 13, color: "rgba(240,237,230,0.7)", lineHeight: 1.6 }}>Kosthold står for ~80% av resultatene. Treningsplanen gir form og styrke – men vekta flytter seg i kjøkkenet.</p>
            </div>
            {plan.kosthold.map(k => (
              <div key={k.tittel} style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 12, padding: "14px 16px", marginBottom: 10, display: "flex", gap: 14, alignItems: "flex-start" }}>
                <span style={{ fontSize: 22 }}>{k.icon}</span>
                <div><div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 700, fontSize: 14, color: "#F0EDE6", marginBottom: 3 }}>{k.tittel}</div><div style={{ fontSize: 13, color: "rgba(240,237,230,0.6)", lineHeight: 1.5 }}>{k.info}</div></div>
              </div>
            ))}
          </div>
        )}

        {fane === "styrke" && (
          <div style={{ animation: "fadeIn 0.25s ease" }}>
            <div style={{ marginBottom: 16 }}>
              <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, letterSpacing: "0.2em", color: "rgba(240,237,230,0.4)", marginBottom: 4 }}>TRENINGSDAGER</div>
              <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 700, fontSize: 16, color: "#FF6B35" }}>{plan.styrke.dager}</div>
              <div style={{ fontSize: 12, color: "rgba(240,237,230,0.4)", fontFamily: "'DM Mono', monospace", marginTop: 2 }}>Sted: {plan.styrke.sted}</div>
            </div>
            {plan.styrke.øvelser.map(ø => <ØvelseKort key={ø.nr} øvelse={ø} />)}
            <p style={{ fontSize: 11, color: "rgba(240,237,230,0.3)", fontFamily: "'DM Mono', monospace", marginTop: 12, textAlign: "center" }}>Trykk på en øvelse for instruksjon</p>
          </div>
        )}

        {fane === "hvile" && (
          <div style={{ animation: "fadeIn 0.25s ease" }}>
            <div style={{ marginBottom: 16 }}>
              <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, letterSpacing: "0.2em", color: "rgba(240,237,230,0.4)", marginBottom: 4 }}>AKTIVE HVILE-DAGER</div>
              <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 700, fontSize: 16, color: "#FF6B35" }}>{plan.hvile.dager}</div>
            </div>
            <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 12, padding: 16, marginBottom: 16 }}>
              <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 800, fontSize: 13, letterSpacing: "0.1em", color: "#FF6B35", marginBottom: 4 }}>🥊 SKYGGEBOKSING TIMER</div>
              <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, color: "rgba(240,237,230,0.35)", marginBottom: 16 }}>3 runder · 3 min arbeid · 1 min pause</div>
              <BoxeTimer />
            </div>
            <div style={{ background: "rgba(0,201,167,0.08)", border: "1px solid rgba(0,201,167,0.2)", borderRadius: 12, padding: 16, marginBottom: 16 }}>
              <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 800, fontSize: 13, letterSpacing: "0.1em", color: "#00C9A7", marginBottom: 10 }}>ANBEFALT STRUKTUR</div>
              {plan.hvile.struktur.map((s, i) => (
                <div key={i} style={{ display: "flex", gap: 12, alignItems: "flex-start", marginBottom: i < plan.hvile.struktur.length - 1 ? 10 : 0 }}>
                  <span style={{ fontSize: 18 }}>{s.ikon}</span>
                  <span style={{ fontSize: 14, color: "rgba(240,237,230,0.75)", lineHeight: 1.5 }}>{s.tekst}</span>
                </div>
              ))}
            </div>
            <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 12, padding: 16 }}>
              <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, letterSpacing: "0.15em", color: "rgba(240,237,230,0.4)", marginBottom: 6 }}>KALORIESTIMAT AKTIV HVILEDAG</div>
              <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 800, fontSize: 28, color: "#FF6B35" }}>400–500</div>
              <div style={{ fontSize: 12, color: "rgba(240,237,230,0.45)", fontFamily: "'DM Mono', monospace" }}>aktive kalorier</div>
              <p style={{ marginTop: 10, fontSize: 13, color: "rgba(240,237,230,0.6)", lineHeight: 1.6 }}>Skyggeboksing er lavintensivt nok til at kroppen restituerer, men effektivt nok til å nå kalorimålet.</p>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
